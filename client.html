<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESA Persona City Sim — Cloud</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#030507;--panel:rgba(4,8,14,0.92);--border:rgba(0,210,160,0.15);
  --accent:#00d2a0;--warn:#ff4858;
  --mono:'Orbitron',monospace;--text:#a8c8c0;--dim:#2a4a44;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);overflow:hidden}
#wrap{position:fixed;inset:0;background:#000;}
canvas{width:100%;height:100%;display:block;}
#overlay{position:fixed;inset:0;background:rgba(3,5,7,.96);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:200;}
#overlay h1{font-family:var(--mono);font-size:18px;font-weight:900;color:var(--accent);letter-spacing:.2em;}
.spinner{width:40px;height:40px;border:2px solid #1a2040;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#overMsg{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.1em;}








#ctrl{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:none;gap:6px;z-index:50;}
button{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:4px;
  padding:6px 12px;font-family:var(--mono);font-size:9px;cursor:pointer;transition:.12s;letter-spacing:.06em;backdrop-filter:blur(8px);}
button:hover{border-color:var(--accent);color:var(--accent);}button.on{border-color:var(--accent);color:var(--accent);}
#status-badge{position:fixed;top:12px;right:14px;z-index:60;font-family:var(--mono);font-size:9px;
  color:var(--dim);background:var(--panel);border:1px solid var(--border);border-radius:4px;
  padding:5px 10px;display:flex;align-items:center;gap:6px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--warn);}
.dot.ok{background:var(--accent);box-shadow:0 0 8px var(--accent);}
#cam-badge{
  position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:60;
  font-family:var(--mono);font-size:10px;color:var(--accent);
  background:var(--panel);border:1px solid var(--border);
  border-radius:4px;padding:5px 16px;letter-spacing:.1em;
  transition:opacity .3s;
}
/* 思考ウィンドウ */
#thought-box{
  position:fixed;bottom:50px;left:50%;transform:translateX(-50%);
  z-index:60;width:min(420px, 90vw);
  background:var(--panel);border:1px solid var(--border);
  border-radius:8px;padding:12px 16px;
  backdrop-filter:blur(12px);
  display:none;  /* 俯瞰中は非表示 */
}
#thought-persona{
  font-family:var(--mono);font-size:9px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:8px;
}
#thought-text{
  font-size:11px;line-height:1.8;color:var(--text);
  min-height:2em;
  white-space:pre-wrap;
}
.thought-cursor{
  display:inline-block;width:2px;height:1em;
  background:var(--accent);vertical-align:middle;
  animation:blink .8s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

#dbg{position:fixed;bottom:50px;left:10px;z-index:60;display:none;
  font-family:monospace;font-size:9px;color:#4a7a6a;background:rgba(4,8,14,0.9);
  padding:6px 10px;border-radius:3px;border:1px solid var(--border);max-width:420px;line-height:1.8;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.02) 2px,rgba(0,0,0,.02) 4px);z-index:300;}
</style>
</head>
<body>
<div id="wrap"><canvas id="canvas"></canvas></div>

<div id="overlay">
  <h1>MESA PERSONA CITY</h1>
  <div class="spinner"></div>
  <div id="overMsg">CONNECTING TO SERVER...</div>
</div>

<div id="status-badge">
  <div class="dot" id="connDot"></div>
  <span id="connText">OFFLINE</span>
</div>



<div id="ctrl">
  <button id="b-pause" class="on">Pause</button>
  <button id="b-reset">Reset</button>
  <button id="b-speed">×1</button>
  <button id="b-newmap">🎲 New Map</button>
</div>

<div id="cam-badge">📷 Overview</div>
<div id="thought-box">
  <div id="thought-persona"></div>
  <div id="thought-text"><span class="thought-cursor"></span></div>
</div>
<div id="dbg"></div>

<script>
// ── URL params ──
const params   = new URLSearchParams(location.search);
const IS_DEBUG = params.get('debug') === '1';
const IS_ADMIN = params.get('admin') === '1';
if(IS_DEBUG) document.getElementById('dbg').style.display  = 'block';
if(IS_ADMIN) document.getElementById('ctrl').style.display = 'flex';

// ── debug log ──
function dbg(msg){
  if(!IS_DEBUG)return;
  const el=document.getElementById('dbg');
  const ts=new Date().toISOString().slice(11,23);
  el.insertAdjacentHTML('beforeend',`<div><span style="color:#2a4a44">${ts}</span> ${msg}</div>`);
  while(el.children.length>12)el.removeChild(el.firstChild);
}

// ── personas ──
const PERSONA_DEFS=[
  {id:'A',name:'Explorer Rex',  hex:'#ff3355',desc:'Actively explores new areas'},
  {id:'B',name:'Homebody Lily',  hex:'#00ccff',desc:'Takes the shortest route'},
  {id:'C',name:'Social Marco',   hex:'#33ff88',desc:'Gathers near others'},
  {id:'D',name:'Businessman Cole',hex:'#ffee00',desc:'Moves straight, efficiency first'},
  {id:'E',name:'Tourist Elena',   hex:'#ff7700',desc:'Wanders around buildings'},
];


// ── canvas 描画 ──
const canvas=document.getElementById('canvas');
const ctx2d=canvas.getContext('2d');

// サーバーの解像度比率 (server.js の WIDTH/HEIGHT と合わせる)
const STREAM_W = 240, STREAM_H = 240;
const ASPECT = STREAM_W / STREAM_H;  // 1.0 = 正方形

function resizeCanvas(){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// アスペクト比を維持してletterbox描画
function drawFrame(blob){
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    const cw = canvas.width, ch = canvas.height;

    // letterbox: 画面に収まる最大サイズを計算
    let dw, dh;
    if (cw / ch > ASPECT) {
      // 画面が横長 → 高さ基準
      dh = ch;
      dw = ch * ASPECT;
    } else {
      // 画面が縦長 → 幅基準
      dw = cw;
      dh = cw / ASPECT;
    }
    const dx = (cw - dw) / 2;
    const dy = (ch - dh) / 2;

    ctx2d.fillStyle = '#000';
    ctx2d.fillRect(0, 0, cw, ch);              // 黒背景
    ctx2d.drawImage(img, dx, dy, dw, dh);      // 中央にletterbox描画
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

// ── WebSocket ──
const setStatus=(t,ok=false)=>{
  document.getElementById('connText').textContent=t;
  document.getElementById('connDot').className='dot'+(ok?' ok':'');
};
const hideOverlay=()=>document.getElementById('overlay').style.display='none';
const showOverlay=msg=>{
  document.getElementById('overlay').style.display='flex';
  document.getElementById('overMsg').textContent=msg;
};

let ws=null, frameCount=0, lastFrameTime=0;

function connect(){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  const url=proto+'//'+location.host;
  dbg('connecting '+url);
  setStatus('CONNECTING...');
  showOverlay('CONNECTING TO SERVER...');

  ws=new WebSocket(url);
  ws.binaryType='blob';  // JPEGをblobとして受け取る

  ws.onopen=()=>{
    dbg('WS open');
    setStatus('CONNECTED', true);
    showOverlay('RECEIVING STREAM...');
  };

  ws.onmessage=e=>{
    if(e.data instanceof Blob){
      // バイナリ = JPEGフレーム
      drawFrame(e.data);
      frameCount++;
      const now=Date.now();
      if(frameCount===1){
        dbg('first frame received!');
        hideOverlay();
        setStatus('STREAMING', true);
      }
      if(IS_DEBUG && frameCount%60===0){
        const fps=(60000/(now-lastFrameTime)).toFixed(1);
        dbg(`frame=${frameCount} fps=${fps}`);
        lastFrameTime=now;
      }
    } else {
      // テキスト = JSON (stats等)
      try{
        const msg=JSON.parse(e.data);
        if(msg.type==='stats'){
          // カメラ名更新
          if(msg.camName){
            const badge = document.getElementById('cam-badge');
            const isOverview = msg.camName === '俯瞰';
            badge.textContent = isOverview ? '📷 Overview' : '🎯 ' + msg.camName;
            // カメラ切り替わり検知 → 思考ウィンドウ更新
            if(msg.camName !== badge._last) {
              badge._last = msg.camName;
              showThought(msg.camName);
            }
          }

        }
      }catch(e){}
    }
  };

  ws.onerror=()=>{dbg('WS error');setStatus('ERROR');};
  ws.onclose=()=>{
    dbg('WS closed → reconnecting in 3s');
    setStatus('OFFLINE');
    showOverlay('RECONNECTING...');
    setTimeout(connect,3000);
  };
}

// ── 思考ウィンドウ ──────────────────────────────────────────────────────────
const PERSONA_THOUGHTS = {
  "overview": null,
  "Explorer Rex":   "Found a new area... heading somewhere unexplored......",
  "Homebody Lily":   "Calculating shortest path... almost there......",
  "Social Marco":    "Someone must be nearby... let me get a little closer......",
  "Businessman Cole": "No time to waste... selecting the most efficient route......",
  "Tourist Elena":    "That building looks interesting... where should I explore next......",
};

let thoughtTimer = null;
let thoughtFullText = '';
let thoughtCharIdx  = 0;

function showThought(personaName) {
  const box  = document.getElementById('thought-box');
  const nameEl = document.getElementById('thought-persona');
  const textEl = document.getElementById('thought-text');

  if (!personaName || personaName === 'overview' || !PERSONA_THOUGHTS[personaName]) {
    box.style.display = 'none';
    if (thoughtTimer) clearInterval(thoughtTimer);
    return;
  }

  // ペルソナ名と色を設定
  const persona = PERSONA_DEFS.find(p => p.name === personaName);
  const color   = persona ? persona.hex : 'var(--accent)';
  nameEl.textContent  = '💭 ' + personaName;
  nameEl.style.color  = color;

  // タイプライター開始
  if (thoughtTimer) clearInterval(thoughtTimer);
  thoughtFullText = PERSONA_THOUGHTS[personaName];
  thoughtCharIdx  = 0;
  textEl.innerHTML = '<span class="thought-cursor"></span>';
  box.style.display = 'block';

  thoughtTimer = setInterval(() => {
    if (thoughtCharIdx >= thoughtFullText.length) {
      clearInterval(thoughtTimer);
      return;
    }
    const shown = thoughtFullText.slice(0, ++thoughtCharIdx);
    textEl.innerHTML = shown + '<span class="thought-cursor"></span>';
  }, 40);
}

// ── admin controls ──
function cmd(c){if(IS_ADMIN&&ws&&ws.readyState===1)ws.send(JSON.stringify({type:'command',cmd:c}));}
document.getElementById('b-pause').addEventListener('click',function(){
  cmd('pause');this.classList.toggle('on');
  this.textContent=this.classList.contains('on')?'Pause':'Resume';
});
document.getElementById('b-reset').addEventListener('click',()=>cmd('reset'));
document.getElementById('b-speed').addEventListener('click',function(){
  cmd('speed');const l=['×1','×2','×4'];
  this.textContent=l[(l.indexOf(this.textContent)+1)%3];
});
document.getElementById('b-newmap').addEventListener('click',()=>cmd('newmap'));

connect();
</script>
</body>
</html>
