<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MESA PERSONA CITY — Standalone</title>
<style>
  :root{
    --bg:#eaf2f7; --panel:rgba(255,255,255,.72); --border:rgba(40,70,90,.25);
    --text:#243a44; --dim:#5f7a86; --accent:#1f9e8a; --warn:#e0a020;
    --mono:'SFMono-Regular',Consolas,'Liberation Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;background:var(--bg);color:var(--text);overflow:hidden;font-family:var(--mono);}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);}
  canvas{display:block;box-shadow:0 8px 40px rgba(40,70,90,.18);border-radius:6px;}

  /* ── loading overlay ── */
  #overlay{position:fixed;inset:0;background:rgba(234,242,247,.97);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:500;}
  #overlay h1{font-size:18px;font-weight:900;color:var(--accent);letter-spacing:.2em;}
  .spinner{width:40px;height:40px;border:3px solid #cfe0e6;border-top-color:var(--accent);
    border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  #overMsg{font-size:11px;color:var(--dim);letter-spacing:.05em;max-width:80vw;text-align:center;}
  #overBar{width:240px;height:6px;background:#d3e1e7;border-radius:3px;overflow:hidden;}
  #overBarFill{height:100%;width:0;background:var(--accent);transition:width .25s;}

  /* ── badges / controls ── */
  #status-badge{position:fixed;top:12px;left:12px;display:flex;align-items:center;gap:7px;
    font-size:10px;color:var(--dim);background:var(--panel);border:1px solid var(--border);
    border-radius:5px;padding:5px 10px;backdrop-filter:blur(6px);z-index:300;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--warn);}
  .dot.ok{background:var(--accent);box-shadow:0 0 8px var(--accent);}

  #cam-badge{position:fixed;top:12px;right:12px;font-size:11px;color:var(--accent);
    background:var(--panel);border:1px solid var(--border);border-radius:5px;
    padding:5px 12px;backdrop-filter:blur(6px);z-index:300;font-weight:700;}

  #ctrl{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:300;}
  button{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:5px;
    padding:7px 12px;font-family:var(--mono);font-size:11px;cursor:pointer;backdrop-filter:blur(6px);}
  button:hover{border-color:var(--accent);color:var(--accent);}
  button.on{border-color:var(--accent);color:var(--accent);}

  #thought-box{position:fixed;bottom:54px;left:50%;transform:translateX(-50%);
    max-width:min(440px,84vw);background:var(--panel);border:1px solid var(--border);
    border-radius:8px;padding:10px 14px;backdrop-filter:blur(6px);z-index:300;display:none;}
  #thought-persona{font-size:11px;font-weight:700;margin-bottom:3px;}
  #thought-text{font-size:11px;color:var(--text);line-height:1.6;min-height:1.2em;}
  .thought-cursor{display:inline-block;width:6px;height:11px;background:var(--accent);
    vertical-align:middle;animation:blink 1s step-end infinite;}
  @keyframes blink{50%{opacity:0}}

  #goal-panel{position:fixed;bottom:54px;left:50%;transform:translateX(-50%);
    background:var(--panel);border:1px solid var(--border);border-radius:8px;
    padding:10px 14px;backdrop-filter:blur(6px);z-index:301;display:none;
    max-width:min(460px,88vw);font-family:var(--mono);}
  #goal-title{font-size:11px;font-weight:700;margin-bottom:6px;color:var(--accent);}
  .goal-row{display:flex;align-items:center;gap:8px;margin:4px 0;}
  .goal-name{font-size:11px;font-weight:700;flex:1;white-space:nowrap;}
  .goal-row select{background:var(--panel);border:1px solid var(--border);color:var(--text);
    border-radius:4px;padding:3px 6px;font-family:var(--mono);font-size:11px;cursor:pointer;}
  #goal-note{font-size:9px;color:var(--dim);margin-top:7px;line-height:1.5;}

  #stream-panel{position:fixed;bottom:54px;left:50%;transform:translateX(-50%);
    background:var(--panel);border:1px solid var(--border);border-radius:8px;
    padding:10px 14px;backdrop-filter:blur(6px);z-index:301;display:none;
    max-width:min(360px,88vw);font-family:var(--mono);}
  #stream-title{font-size:11px;font-weight:700;margin-bottom:6px;color:var(--accent);}
  #stream-note{font-size:9px;color:var(--dim);margin-top:7px;line-height:1.5;}

  #dbg{position:fixed;bottom:12px;right:12px;font-size:9px;color:var(--dim);
    background:var(--panel);border:1px solid var(--border);border-radius:5px;padding:6px 8px;
    max-width:46vw;z-index:300;display:none;line-height:1.6;}
</style>

<!-- THREE.js (overview rendering) + onnxruntime-web (DINOv2 + persona policy) -->

<script>
'use strict';
// ════════════════════════════════════════════════════════════════════════════
//  MESA Persona City — クライアント単独版
//  server.js と同一のポリシー/観測パイプラインをブラウザ内で実行する。
//   FP描画(224×224 テクスチャ付きレイキャスタ) → dinov2_vits14.onnx → CLS(384)
//   → persona_X.onnx(head) → logits(3) → サンプリング
//  ※ server.js から忠実移植。重い計算(DINOv2)はクライアント側で動く。
// ════════════════════════════════════════════════════════════════════════════

const params   = new URLSearchParams(location.search);
const IS_DEBUG = params.get('debug') === '1';
const IS_ADMIN = params.get('admin') === '1';
if(IS_DEBUG) document.getElementById('dbg').style.display='block';
if(!IS_ADMIN) document.getElementById('ctrl').style.display='none';

function dbg(msg){
  if(!IS_DEBUG)return;
  const el=document.getElementById('dbg');
  const ts=new Date().toISOString().slice(11,23);
  el.insertAdjacentHTML('beforeend',`<div><span style="color:#9bb">${ts}</span> ${msg}</div>`);
  while(el.children.length>12)el.removeChild(el.firstChild);
}
function setOverlay(msg,pct){
  document.getElementById('overMsg').textContent=msg;
  if(pct!=null) document.getElementById('overBarFill').style.width=Math.round(pct*100)+'%';
}
function setStatus(t,ok){
  document.getElementById('connText').textContent=t;
  document.getElementById('connDot').className='dot'+(ok?' ok':'');
}

// ─── Sim 定数 (server.js と一致) ──────────────────────────────────────────────
const GRID=30, CELL=2.0, TICK=300, INFER_EVERY=10;
// 軌跡(trail)の最大点数。長いほど遠くまで残るが描画負荷(メッシュ数)が増える。
// URL ?trail=N で初期値指定 (例: standalone.html?trail=300)。実行中は setTrailLength(N) で変更可。
let MAX_TRAIL=parseInt(new URLSearchParams(location.search).get('trail'))||500;
const OTHER=0, ROAD=1, BUILDING=2, TREE=3;
const PASSABLE=new Set([ROAD, BUILDING]);
const MOVE=0.25, ROT=Math.PI/9;
const RAY_MAX=6.0, RAY_STEP=0.15;          // biasedRandom 用
const W=GRID*CELL;
const FP_SKY_RGB=[6,12,20], FP_FLOOR_RGB=[26,40,32];

const PERSONA_DEFS=[
  { id:'A', name:'Explorer Rex',     color:0xff3355, hex:'#ff3355', desc:'Actively explores new areas' },
  { id:'B', name:'Homebody Lily',    color:0x00ccff, hex:'#00ccff', desc:'Takes the shortest route' },
  { id:'C', name:'Social Marco',     color:0x33ff88, hex:'#33ff88', desc:'Gathers near others' },
  { id:'D', name:'Businessman Cole', color:0xffee00, hex:'#ffee00', desc:'Moves straight, efficiency first' },
  { id:'E', name:'Tourist Elena',    color:0xff7700, hex:'#ff7700', desc:'Wanders around buildings' },
];
const PERSONA_THOUGHTS={
  'Explorer Rex':     'Found a new area... heading somewhere unexplored......',
  'Homebody Lily':    'Calculating shortest path... almost there......',
  'Social Marco':     'Someone must be nearby... let me get a little closer......',
  'Businessman Cole': 'No time to waste... selecting the most efficient route......',
  'Tourist Elena':    'That building looks interesting... where should I explore next......',
};

// ─── 建物タイプ定義 (マスター / server.js と一致) ─────────────────────────────
//   footprint: 1=1x1マス, 2=2x2マス / height: 実寸=height*CELL の高さ倍率(8段階)
const BLDG_TYPES=[
  // 1x1
  { name:'kiosk',       footprint:1, height:0.7, category:'eat',     persona:'CA', fallbackColor:0xd08030, textureFile:'./textures/v4/kiosk.jpg' },
  { name:'conbini',     footprint:1, height:0.9, category:'shop',    persona:'*',  fallbackColor:0x20a8e0, textureFile:'./textures/v4/conbini.jpg' },
  { name:'pharmacy',    footprint:1, height:0.9, category:'shop',    persona:'B',  fallbackColor:0x30b070, textureFile:'./textures/v4/pharmacy.jpg' },
  { name:'cafe',        footprint:1, height:1.1, category:'eat',     persona:'C',  fallbackColor:0x8B5E3C, textureFile:'./textures/v4/cafe.jpg' },
  { name:'gyudon',      footprint:1, height:1.1, category:'eat',     persona:'D',  fallbackColor:0xe8a020, textureFile:'./textures/v4/gyudon.jpg' },
  { name:'ramen',       footprint:1, height:1.1, category:'eat',     persona:'*',  fallbackColor:0xe03030, textureFile:'./textures/v4/ramen.jpg' },
  { name:'bento',       footprint:1, height:1.1, category:'eat',     persona:'B',  fallbackColor:0x20a020, textureFile:'./textures/v4/bento.jpg' },
  { name:'shop',        footprint:1, height:1.4, category:'shop',    persona:'E',  fallbackColor:0xc060a0, textureFile:'./textures/v4/shop.jpg' },
  { name:'house',       footprint:1, height:1.4, category:'home',    persona:'B',  fallbackColor:0xa06040, textureFile:'./textures/v4/house.jpg' },
  { name:'post',        footprint:1, height:1.4, category:'civic',   persona:'D',  fallbackColor:0xd04040, textureFile:'./textures/v4/post.jpg' },
  { name:'bank',        footprint:1, height:1.7, category:'civic',   persona:'D',  fallbackColor:0x808890, textureFile:'./textures/v4/bank.jpg' },
  { name:'apartment',   footprint:1, height:2.1, category:'home',    persona:'B',  fallbackColor:0x9088a0, textureFile:'./textures/v4/apartment.jpg' },
  { name:'hotel',       footprint:1, height:2.1, category:'tour',    persona:'E',  fallbackColor:0xc0a060, textureFile:'./textures/v4/hotel.jpg' },
  { name:'office',      footprint:1, height:2.6, category:'work',    persona:'D',  fallbackColor:0x4060a0, textureFile:'./textures/v4/office.jpg' },
  { name:'tower',       footprint:1, height:3.3, category:'work',    persona:'AE', fallbackColor:0x6070b0, textureFile:'./textures/v4/tower.jpg' },
  // 2x2
  { name:'supermarket', footprint:2, height:1.1, category:'shop',    persona:'CB', fallbackColor:0x40a060, textureFile:'./textures/v4/supermarket.jpg' },
  { name:'temple',      footprint:2, height:1.1, category:'tour',    persona:'EA', fallbackColor:0xc04040, textureFile:'./textures/v4/temple.jpg' },
  { name:'school',      footprint:2, height:1.4, category:'learn',   persona:'C',  fallbackColor:0xe0b040, textureFile:'./textures/v4/school.jpg' },
  { name:'station',     footprint:2, height:1.4, category:'transit', persona:'CA', fallbackColor:0x7080a0, textureFile:'./textures/v4/station.jpg' },
  { name:'library',     footprint:2, height:1.4, category:'learn',   persona:'BE', fallbackColor:0x8060a0, textureFile:'./textures/v4/library.jpg' },
  { name:'hospital',    footprint:2, height:1.7, category:'health',  persona:'*',  fallbackColor:0xe0e0f0, textureFile:'./textures/v4/hospital.jpg' },
  { name:'cityhall',    footprint:2, height:1.7, category:'civic',   persona:'D',  fallbackColor:0xb0b4b8, textureFile:'./textures/v4/cityhall.jpg' },
  { name:'museum',      footprint:2, height:1.7, category:'tour',    persona:'E',  fallbackColor:0xa09060, textureFile:'./textures/v4/museum.jpg' },
  { name:'stadium',     footprint:2, height:2.1, category:'leisure', persona:'C',  fallbackColor:0x60a080, textureFile:'./textures/v4/stadium.jpg' },
  { name:'mall',        footprint:2, height:2.6, category:'shop',    persona:'CD', fallbackColor:0x5878a0, textureFile:'./textures/v4/mall.jpg' },
];
const FP1_IDX = BLDG_TYPES.map((b,i)=>b.footprint===1?i:-1).filter(i=>i>=0);
const FP2_IDX = BLDG_TYPES.map((b,i)=>b.footprint===2?i:-1).filter(i=>i>=0);
let BUILDING_TYPES={};   // "r_c" -> typeIdx (buildScene で割当・renderFPImageCfg と共有)

// ════════════════════════════════════════════════════════════════════════════
//  マップ生成 (server.js makeMap と完全一致)
// ════════════════════════════════════════════════════════════════════════════
function makeMap(size, seed){
  let s=seed>>>0;
  const rng=()=>{s=(s*1664525+1013904223)>>>0;return s/0xffffffff};
  const ri=n=>Math.floor(rng()*n);
  const pick=a=>a[ri(a.length)];
  const g=Array.from({length:size},()=>new Array(size).fill(OTHER));
  const step=4, rows=[], cols=[];
  for(let i=0;i<size;i+=step){rows.push(i);cols.push(i);}
  rows.forEach(r=>{for(let c=0;c<size;c++)g[r][c]=ROAD;});
  cols.forEach(c=>{for(let r=0;r<size;r++)g[r][c]=ROAD;});
  for(let ri2=0;ri2<rows.length-1;ri2++){
    for(let ci=0;ci<cols.length-1;ci++){
      const r0=rows[ri2]+1,r1=rows[ri2+1],c0=cols[ci]+1,c1=cols[ci+1];
      const cells=[];
      for(let r=r0;r<r1;r++)for(let c=c0;c<c1;c++)cells.push([r,c]);
      if(!cells.length)continue;
      // 敷地に余裕があれば一定確率で 2x2 の建物パッチを塗る
      let patch=null;
      if(r1-r0>=2 && c1-c0>=2 && rng()<0.42){
        const pr=(rng()<0.5)?r0:r1-2, pc=(rng()<0.5)?c0:c1-2;
        for(let r=pr;r<pr+2;r++)for(let c=pc;c<pc+2;c++)g[r][c]=BUILDING;
        patch={pr,pc};
      }
      const b=pick(cells);g[b[0]][b[1]]=BUILDING;
      cells.forEach(([r,c])=>{
        if(r===b[0]&&c===b[1])return;
        if(patch && r>=patch.pr && r<patch.pr+2 && c>=patch.pc && c<patch.pc+2)return;
        const v=rng();
        if(v<.25)g[r][c]=TREE;else if(v<.45)g[r][c]=BUILDING;
      });
    }
  }
  rows.forEach(r=>{for(let c=0;c<size;c++)g[r][c]=ROAD;});
  cols.forEach(c=>{for(let r=0;r<size;r++)g[r][c]=ROAD;});
  const isX=(r,c)=>rows.includes(r)&&cols.includes(c);
  const cands=[];
  for(let r=0;r<size;r++)for(let c=0;c<size;c++)
    if(g[r][c]===ROAD&&!isX(r,c))cands.push([r,c]);
  for(let i=cands.length-1;i>0;i--){const j=ri(i+1);[cands[i],cands[j]]=[cands[j],cands[i]];}
  function roadOK(grid){
    let sr=-1,sc=-1;
    outer:for(let r=0;r<size;r++)for(let c=0;c<size;c++)if(grid[r][c]===ROAD){sr=r;sc=c;break outer;}
    if(sr<0)return true;
    const vis=new Set(),q=[[sr,sc]];vis.add(sr*size+sc);
    const D=[[-1,0],[1,0],[0,-1],[0,1]];
    while(q.length){const[r,c]=q.shift();for(const[dr,dc]of D){const nr=r+dr,nc=c+dc;if(nr<0||nr>=size||nc<0||nc>=size)continue;const k=nr*size+nc;if(!vis.has(k)&&grid[nr][nc]===ROAD){vis.add(k);q.push([nr,nc]);}}}
    for(let r=0;r<size;r++)for(let c=0;c<size;c++)if(grid[r][c]===ROAD&&!vis.has(r*size+c))return false;
    return true;
  }
  const maxRm=Math.floor(cands.length*(0.30+rng()*0.25));let rm=0;
  for(const[r,c]of cands){if(rm>=maxRm)break;g[r][c]=OTHER;if(roadOK(g)){g[r][c]=rng()<0.4?TREE:OTHER;rm++;}else g[r][c]=ROAD;}
  return g;
}

// ════════════════════════════════════════════════════════════════════════════
//  テクスチャ読み込み
// ════════════════════════════════════════════════════════════════════════════
const RC_TW=64, RC_TH=64;
let rcTex=[], rcTexReady=false;        // レイキャスタ用 (64×64 RGB [0,1])
const overviewTex={};                  // 俯瞰表示用 THREE.Texture

function loadImage(src){
  return new Promise((res,rej)=>{
    const im=new Image(); im.crossOrigin='anonymous';
    im.onload=()=>res(im); im.onerror=()=>rej(new Error('img '+src)); im.src=src;
  });
}

// レイキャスタ用: PNG を 64×64 RGB Float32 [0,1] に。失敗時は fallbackColor で塗りつぶす。
async function loadRaycastTextures(){
  const cv=document.createElement('canvas'); cv.width=RC_TW; cv.height=RC_TH;
  const cx=cv.getContext('2d',{willReadFrequently:true});
  rcTex=new Array(BLDG_TYPES.length);
  for(let i=0;i<BLDG_TYPES.length;i++){
    const bt=BLDG_TYPES[i];
    const f=new Float32Array(RC_TW*RC_TH*3);
    try{
      const im=await loadImage(bt.textureFile);
      cx.clearRect(0,0,RC_TW,RC_TH); cx.drawImage(im,0,0,RC_TW,RC_TH);
      const d=cx.getImageData(0,0,RC_TW,RC_TH).data;
      for(let k=0;k<RC_TW*RC_TH;k++){ f[k*3]=d[k*4]/255; f[k*3+1]=d[k*4+1]/255; f[k*3+2]=d[k*4+2]/255; }
    }catch(e){
      const r=((bt.fallbackColor>>16)&255)/255, g=((bt.fallbackColor>>8)&255)/255, b=(bt.fallbackColor&255)/255;
      for(let k=0;k<RC_TW*RC_TH;k++){ f[k*3]=r; f[k*3+1]=g; f[k*3+2]=b; }
      dbg('raycast tex fallback: '+bt.name);
    }
    rcTex[i]=f;
  }
  rcTexReady=true;
}

// 俯瞰表示用: THREE.Texture を読み込む (失敗は無視 → fallbackColor マテリアル)
async function loadOverviewTextures(){
  const loader=new THREE.TextureLoader();
  await Promise.all(BLDG_TYPES.map(bt=>new Promise(res=>{
    loader.load(bt.textureFile, t=>{
      // NPOT テクスチャ(非2べき乗)を素の縦横比のまま使う: ClampToEdge + Linear + mipmap無し
      t.wrapS=t.wrapT=THREE.ClampToEdgeWrapping;
      t.minFilter=THREE.LinearFilter; t.magFilter=THREE.LinearFilter; t.generateMipmaps=false;
      t.flipY=true; overviewTex[bt.textureFile]=t; res();
    }, undefined, ()=>{ overviewTex[bt.textureFile]=null; res(); });
  })));
}

// ════════════════════════════════════════════════════════════════════════════
//  FP観測レンダリング (server.js renderFPImageCfg と一致) — DINOv2 入力
// ════════════════════════════════════════════════════════════════════════════
const _renderBufs={};
function getRenderBuf(w,h){ const k=w+'x'+h; if(!_renderBufs[k])_renderBufs[k]=new Float32Array(3*h*w); return _renderBufs[k]; }

function renderFPImageCfg(map, agent, cfg){
  const Wc=cfg.w, Hc=cfg.h, HW=Hc*Wc;
  const sky=cfg.sky, fl=cfg.floor, FOV=cfg.fov;
  const buf=getRenderBuf(Wc,Hc);
  for(let yi=0;yi<Hc;yi++){
    const col=(yi<Hc*0.5)?sky:fl;
    for(let xi=0;xi<Wc;xi++){ const pi=yi*Wc+xi; buf[pi]=col[0]; buf[HW+pi]=col[1]; buf[2*HW+pi]=col[2]; }
  }
  if(!rcTexReady) return buf;
  const dirX=Math.cos(agent.th), dirY=Math.sin(agent.th);
  const pl=Math.tan(FOV/2), planeX=-dirY*pl, planeY=dirX*pl;
  for(let x=0;x<Wc;x++){
    const cam=2*x/Wc-1;
    const rdx=dirX+planeX*cam, rdy=dirY+planeY*cam;
    let mapX=Math.floor(agent.x), mapY=Math.floor(agent.y);
    const ddx=rdx===0?1e30:Math.abs(1/rdx), ddy=rdy===0?1e30:Math.abs(1/rdy);
    let stepX,stepY,sdx,sdy;
    if(rdx<0){stepX=-1;sdx=(agent.x-mapX)*ddx;}else{stepX=1;sdx=(mapX+1-agent.x)*ddx;}
    if(rdy<0){stepY=-1;sdy=(agent.y-mapY)*ddy;}else{stepY=1;sdy=(mapY+1-agent.y)*ddy;}
    let hit=-1, side=0, g=0;
    while(g++<64){
      if(sdx<sdy){sdx+=ddx;mapX+=stepX;side=0;}else{sdy+=ddy;mapY+=stepY;side=1;}
      if(mapX<0||mapX>=GRID||mapY<0||mapY>=GRID) break;
      if(map[mapX][mapY]===BUILDING){ const ti=BUILDING_TYPES[mapX+'_'+mapY]; hit=(ti==null?0:ti); break; }
    }
    if(hit<0) continue;
    const tex=rcTex[hit % rcTex.length]; if(!tex) continue;
    const perp=Math.max(1e-4, side===0?(sdx-ddx):(sdy-ddy));
    const lineH=Hc/perp;
    const dsC=Math.min(Hc-1, Math.max(0, -lineH/2+Hc/2));
    const deC=Math.min(Hc-1, Math.max(0,  lineH/2+Hc/2));
    let wallX=side===0?agent.y+perp*rdy:agent.x+perp*rdx; wallX-=Math.floor(wallX);
    let texXi=Math.floor(wallX*RC_TW);
    if((side===0&&rdx>0)||(side===1&&rdy<0)) texXi=RC_TW-1-texXi;
    if(texXi<0)texXi=0; if(texXi>=RC_TW)texXi=RC_TW-1;
    const br=Math.min(1.0, Math.max(0.35, 1.0-perp/9));
    for(let yi=Math.ceil(dsC); yi<=deC; yi++){
      let texYi=Math.floor((yi-dsC)/lineH*RC_TH);
      if(texYi<0)texYi=0; if(texYi>=RC_TH)texYi=RC_TH-1;
      const ti=(texYi*RC_TW+texXi)*3, pi=yi*Wc+x;
      buf[pi]=tex[ti]*br; buf[HW+pi]=tex[ti+1]*br; buf[2*HW+pi]=tex[ti+2]*br;
    }
  }
  return buf;
}

//  ONNX セッション (DINOv2 + persona heads)
// ════════════════════════════════════════════════════════════════════════════
let dinoSession=null, dinoIn='image', dinoClsOut='cls';
const ortSessions={}, personaMeta={};

async function loadONNX(progress){
  ort.env.wasm.wasmPaths='https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/';
  const EP_DINO=['webgpu','wasm'], EP_HEAD=['wasm'];

  // DINOv2 本体 (自己ホスト 88MB)。webgpu があれば高速。
  // 重みは外部データ (dinov2_vits14.onnx.data) なので externalData を明示する。
  setOverlay('Loading DINOv2 (≈88MB, first time only)…', progress(0));
  try{
    dinoSession=await ort.InferenceSession.create('./data/dinov2_vits14.onnx',{
      executionProviders:EP_DINO,
      externalData:[{ path:'dinov2_vits14.onnx.data', data:'./data/dinov2_vits14.onnx.data' }],
    });
    dinoIn=dinoSession.inputNames[0];
    dinoClsOut=dinoSession.outputNames.find(n=>/cls/i.test(n))||dinoSession.outputNames[0];
    dbg('dinov2 in='+dinoIn+' out='+dinoSession.outputNames.join(','));
  }catch(e){ console.warn('[DINOv2] load failed:',e); dinoSession=null; }

  // persona heads + meta
  for(let i=0;i<PERSONA_DEFS.length;i++){
    const p=PERSONA_DEFS[i];
    setOverlay(`Loading persona ${p.id}…`, progress((i+1)/(PERSONA_DEFS.length+1)));
    try{
      const m=await fetch(`./data/persona_${p.id}_meta.json`).then(r=>r.ok?r.json():null);
      if(m){
        personaMeta[p.id]={
          inputSize:m.input_size,
          goalDim:m.goal_dim||0,
          auxDim:m.aux_dim||0,               // >0 なら補助観測 (compass/visited/social) 付き = 401モデル
          visitR:m.visit_radius||5,
          visitWin:m.visit_window_ticks||4000,
          socialRange:m.social_range||8,
          // 前方障害物センサ (aux_dim>=12 のとき有効)。学習側 OBST_* と一致させる。
          obstRayMax:m.obst_ray_max||3.0,
          obstStep:m.obst_step||0.25,
          obstOff:((m.obst_off_deg!=null?m.obst_off_deg:40)*Math.PI)/180,
          // 学習時の 1tick あたり旋回量。旧モデル(rot_deg=20)は 20°/tick のまま動かす
          rotPerTick:((m.rot_per_tick_deg!=null?m.rot_per_tick_deg:(m.rot_deg||20))*Math.PI)/180,
          dino:m.input_size!==(m.img_w*m.img_h*m.img_ch),
          cfg:{ w:m.img_w, h:m.img_h, fov:(m.fov_deg||60)*Math.PI/180,
                sky:FP_SKY_RGB.map(v=>v/255), floor:FP_FLOOR_RGB.map(v=>v/255) },
        };
      }
      ortSessions[p.id]=await ort.InferenceSession.create(`./data/persona_${p.id}.onnx`,{executionProviders:EP_HEAD});
    }catch(e){ console.warn(`[persona ${p.id}] load failed:`,e); ortSessions[p.id]=null; }
  }
}

// ─── 推論 ─────────────────────────────────────────────────────────────────────
function sampleLogits(lg){
  const mx=Math.max(...lg), ex=lg.map(v=>Math.exp(v-mx));
  const sm=ex.reduce((a,b)=>a+b,0), pr=ex.map(v=>v/sm);
  let rv=Math.random();
  for(let i=0;i<pr.length;i++){rv-=pr[i];if(rv<=0)return i;}
  return 0;
}
function biasedRandom(map, agent){
  const dx=Math.cos(agent.th), dy=Math.sin(agent.th);
  let fwd=ROAD;
  for(let d=RAY_STEP;d<RAY_MAX;d+=RAY_STEP){
    const r=Math.floor(agent.x+dx*d), c=Math.floor(agent.y+dy*d);
    if(r<0||r>=GRID||c<0||c>=GRID){fwd=ROAD;break;}
    const ct=map[r][c]; if(ct===BUILDING||ct===TREE){fwd=ct;break;}
  }
  return (fwd===ROAD && Math.random()<0.55) ? 0 : (Math.random()<0.5?1:2);
}

// 補助観測 aux(9)。学習側 PersonaVecEnvGoal.aux() / server.js buildAux() と同一式。
//   compass(3): 目的地の相対方位 sin/cos + 距離/GRID
//   visited(4): 前/左/右/後セクタ(半径 visitR)の訪問済みセル率 (範囲外=訪問済み扱い)
//   social(2) : 最寄りの他エージェントの相対方位 sin/cos × 近接度
function buildAux(agent, meta){
  const aux=new Float32Array(meta.auxDim);
  const dx=agent.gx-agent.x, dy=agent.gy-agent.y, d=Math.hypot(dx,dy);
  let b=Math.atan2(dy,dx)-agent.th; b=Math.atan2(Math.sin(b),Math.cos(b));
  aux[0]=Math.sin(b); aux[1]=Math.cos(b); aux[2]=Math.min(d/GRID,1);
  const R=meta.visitR, r0=Math.floor(agent.x), c0=Math.floor(agent.y);
  const cnt=[0,0,0,0], hit=[0,0,0,0];
  for(let dr=-R;dr<=R;dr++)for(let dc=-R;dc<=R;dc++){
    let a2=Math.atan2(dc,dr)-agent.th; a2=Math.atan2(Math.sin(a2),Math.cos(a2));
    const s = Math.abs(a2)<=Math.PI/4 ? 0
            : (a2<-Math.PI/4&&a2>-3*Math.PI/4 ? 1
            : (a2> Math.PI/4&&a2< 3*Math.PI/4 ? 2 : 3));
    cnt[s]++;
    const rr=r0+dr, cc=c0+dc;
    if(rr<0||cc<0||rr>=GRID||cc>=GRID){ hit[s]++; continue; }
    const t=agent.visMem&&agent.visMem.get(rr+','+cc);
    if(t!=null && (stepCount-t)<=meta.visitWin) hit[s]++;
  }
  for(let s=0;s<4;s++) aux[3+s]=hit[s]/Math.max(1,cnt[s]);
  let best=Infinity,ox=0,oy=0;
  for(const o of agents){
    if(o===agent) continue;
    const dd=(o.x-agent.x)**2+(o.y-agent.y)**2;
    if(dd<best){best=dd;ox=o.x;oy=o.y;}
  }
  if(best<Infinity){
    const sd=Math.sqrt(best);
    let sb=Math.atan2(oy-agent.y,ox-agent.x)-agent.th; sb=Math.atan2(Math.sin(sb),Math.cos(sb));
    const prox=Math.max(0,1-sd/meta.socialRange);
    aux[7]=Math.sin(sb)*prox; aux[8]=Math.cos(sb)*prox;
  }
  // obstacle(3): front/left/right の通れないセル(木/空地/範囲外)までの距離 → clearance[0,1]
  //   学習側 PersonaVecEnvGoal.aux() / server.js buildAux() と同一式。建物は通れるので壁にしない。
  if(meta.auxDim>=12){
    const oMax=meta.obstRayMax, oStep=meta.obstStep, offs=[0,-meta.obstOff,meta.obstOff];
    for(let k=0;k<3;k++){
      const ca=Math.cos(agent.th+offs[k]), sa=Math.sin(agent.th+offs[k]);
      let hitD=oMax;
      for(let od=oStep; od<=oMax+1e-6; od+=oStep){
        const px=agent.x+ca*od, py=agent.y+sa*od, r=Math.floor(px), c=Math.floor(py);
        if(px<0||px>=GRID||py<0||py>=GRID || !PASSABLE.has(MAP[r][c])){ hitD=od; break; }
      }
      aux[9+k]=Math.min(1, hitD/oMax);
    }
  }
  return aux;
}

async function inferAction(map, agent){
  const id=agent.def.id, sess=ortSessions[id], meta=personaMeta[id];
  if(!sess) return biasedRandom(map, agent);
  try{
    if(meta && meta.dino){
      if(!dinoSession) return biasedRandom(map, agent);
      const img=renderFPImageCfg(map, agent, meta.cfg);
      const di=await dinoSession.run({[dinoIn]:new ort.Tensor('float32', img, [1,3,meta.cfg.h,meta.cfg.w])});
      const cls=di[dinoClsOut];
      // goal条件付け(meta.goalDim>0): [cls, z(, aux)]。z(=agent.goalZ)未設定はゼロ=目標なし=従来挙動。
      let inData=cls.data, inDim=cls.data.length;
      if(meta.goalDim>0 || meta.auxDim>0){
        inDim=cls.data.length+(meta.goalDim||0)+(meta.auxDim||0);
        const cat=new Float32Array(inDim); cat.set(cls.data,0);
        const z=agent.goalZ;
        if(z && meta.goalDim>0 && z.length===meta.goalDim) cat.set(z, cls.data.length);
        if(meta.auxDim>0) cat.set(buildAux(agent,meta), cls.data.length+(meta.goalDim||0));
        inData=cat;
      }
      const ho=await sess.run({[sess.inputNames[0]]:new ort.Tensor('float32', inData, [1, inDim])});
      return sampleLogits(Array.from(ho[sess.outputNames[0]].data));
    }
    // legacy 生画像方式 (現行ポリシーでは未使用だが一応保持)
    const img=renderFPImageCfg(map, agent, meta?meta.cfg:{w:64,h:64,fov:Math.PI/3,sky:FP_SKY_RGB.map(v=>v/255),floor:FP_FLOOR_RGB.map(v=>v/255)});
    const dim=(meta&&meta.inputSize)||img.length;
    const out=await sess.run({[sess.inputNames[0]]:new ort.Tensor('float32', img, [1, dim])});
    return sampleLogits(Array.from(out[sess.outputNames[0]].data));
  }catch(e){ dbg('infer '+id+' fallback: '+e.message); return biasedRandom(map, agent); }
}

const actionCache={};
let stepCount=0;
async function prefetchAllActions(map, ags){
  if(stepCount % INFER_EVERY !== 0) return;
  for(const a of ags) actionCache[a.def.id]=await inferAction(map, a);
}
function selectAction(agent){ return actionCache[agent.def.id] ?? Math.floor(Math.random()*3); }

// ════════════════════════════════════════════════════════════════════════════
//  THREE 俯瞰シーン (server.js buildScene と一致 / 淡い配色)
// ════════════════════════════════════════════════════════════════════════════
function pushQuad(arr,size,tx,ty,z){
  const h=size/2,x0=tx-h,x1=tx+h,y0=ty-h,y1=ty+h;
  arr.push(x0,y0,z, x1,y0,z, x1,y1,z,  x0,y0,z, x1,y1,z, x0,y1,z);
}
function quadMesh(posArr,color){
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(new Float32Array(posArr),3));
  g.computeVertexNormals();
  return new THREE.Mesh(g,new THREE.MeshLambertMaterial({color}));
}
function mergeGeos(geos,includeUV){
  let posLen=0,uvLen=0;
  for(const g of geos){ posLen+=g.attributes.position.array.length; if(includeUV)uvLen+=g.attributes.uv.array.length; }
  const pos=new Float32Array(posLen), uv=includeUV?new Float32Array(uvLen):null;
  let po=0,uo=0;
  for(const g of geos){ const pa=g.attributes.position.array; pos.set(pa,po); po+=pa.length;
    if(includeUV){ const ua=g.attributes.uv.array; uv.set(ua,uo); uo+=ua.length; } }
  const m=new THREE.BufferGeometry();
  m.setAttribute('position',new THREE.BufferAttribute(pos,3));
  if(includeUV) m.setAttribute('uv',new THREE.BufferAttribute(uv,2));
  m.computeVertexNormals();
  return m;
}
function extractFace(boxGeo,group,tx,ty,tz){
  const idx=boxGeo.index.array, P=boxGeo.attributes.position.array, U=boxGeo.attributes.uv.array;
  const n=group.count, pos=new Float32Array(n*3), uv=new Float32Array(n*2);
  for(let k=0;k<n;k++){ const vi=idx[group.start+k];
    pos[k*3]=P[vi*3]+tx; pos[k*3+1]=P[vi*3+1]+ty; pos[k*3+2]=P[vi*3+2]+tz;
    uv[k*2]=U[vi*2]; uv[k*2+1]=U[vi*2+1]; }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  g.setAttribute('uv',new THREE.BufferAttribute(uv,2));
  return g;
}

let buildingMatCache={};
function getBuildingMaterial(typeIdx){
  const key=typeIdx%BLDG_TYPES.length;
  if(buildingMatCache[key]) return buildingMatCache[key];
  const bt=BLDG_TYPES[key], sideTex=overviewTex[bt.textureFile];
  function makeMat(flipU,rotateDeg){
    if(!sideTex) return new THREE.MeshLambertMaterial({color:bt.fallbackColor});
    const t=sideTex.clone(); t.needsUpdate=true;
    if(rotateDeg!==0){ t.rotation=rotateDeg*Math.PI/180; t.center.set(0.5,0.5); }
    t.repeat.set(flipU?-1:1,1); t.offset.set(flipU?1:0,0);
    return new THREE.MeshLambertMaterial({map:t});
  }
  const mats=[
    // 0:+X右 1:-X左 2:+Y正面(180°回転で補正) 3:-Y背面(無変換)
    makeMat(false, 90), makeMat(false,-90), makeMat(false,180), makeMat(false,0),
    new THREE.MeshLambertMaterial({color:0xb0b4ac}),  // 屋上
    new THREE.MeshLambertMaterial({color:0x666666}),  // 底面
  ];
  buildingMatCache[key]=mats;
  return mats;
}

// キャラクター近傍のオブジェクトをフェードさせるための管理テーブル。
// key -> {mesh, cx, cy, faded}。mesh.material は建物ごとに clone した専用インスタンス
// (型/面で共有される元マテリアルの opacity を書き換えると他の建物にも波及してしまうため)。
let occluders={};
function buildScene(map){
  buildingMatCache={}; BUILDING_TYPES={}; occluders={};
  const rng=(()=>{let s=42;return()=>{s=(s*1664525+1013904223)>>>0;return s/0xffffffff;};})();
  // 建物を「構造 (1x1 or 2x2)」として型割当 (server.js buildScene と一致)
  const assigned=new Set(), structures=[];
  const isB=(r,c)=>r>=0&&r<GRID&&c>=0&&c<GRID&&map[r][c]===BUILDING;
  for(let r=0;r<GRID-1;r++)for(let c=0;c<GRID-1;c++){
    if(assigned.has(r+'_'+c))continue;
    if(isB(r,c)&&isB(r+1,c)&&isB(r,c+1)&&isB(r+1,c+1)
       && !assigned.has((r+1)+'_'+c) && !assigned.has(r+'_'+(c+1)) && !assigned.has((r+1)+'_'+(c+1))){
      const typeIdx=FP2_IDX[Math.floor(rng()*FP2_IDX.length)];
      for(let dr=0;dr<2;dr++)for(let dc=0;dc<2;dc++){
        const kk=(r+dr)+'_'+(c+dc); assigned.add(kk); BUILDING_TYPES[kk]=typeIdx;
      }
      structures.push({r,c,fp:2,typeIdx});
    }
  }
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    if(map[r][c]!==BUILDING || assigned.has(r+'_'+c))continue;
    const typeIdx=FP1_IDX[Math.floor(rng()*FP1_IDX.length)];
    assigned.add(r+'_'+c); BUILDING_TYPES[r+'_'+c]=typeIdx;
    structures.push({r,c,fp:1,typeIdx});
  }

  const S=new THREE.Scene(); S.background=new THREE.Color(0xeaf2f7);
  S.add(new THREE.AmbientLight(0xbcd0e0,1.3));
  S.add(new THREE.HemisphereLight(0xeaf2f7,0xc8c0b0,1.1));
  const sun=new THREE.DirectionalLight(0xfff4e0,1.7);
  sun.position.set(W*.4,-W*.3,W*.8); S.add(sun);
  const gnd=new THREE.Mesh(new THREE.PlaneGeometry(W,W),new THREE.MeshLambertMaterial({color:0xe6e9e2}));
  gnd.position.set(W/2,W/2,0); S.add(gnd);

  const roadPos=[], groundPos=[];
  const trunkGeo=new THREE.BoxGeometry(CELL*.15,CELL*.15,CELL*.4);
  const coneGeo =new THREE.BoxGeometry(CELL*.55,CELL*.55,CELL*.45);
  const trunkMat=new THREE.MeshLambertMaterial({color:0x8a5a32});
  const coneMat =new THREE.MeshLambertMaterial({color:0x4f9e44});
  const boxGeoByH={};
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const t=map[r][c],cx=c*CELL+CELL*.5,cy=r*CELL+CELL*.5;
    if(t===BUILDING){
      // 建物は下の structures ループで構造単位 (1x1/2x2) に描画
    }else if(t===TREE){
      const trunk=new THREE.Mesh(trunkGeo,trunkMat.clone());
      trunk.position.set(cx,cy,CELL*.2); S.add(trunk);
      const cone=new THREE.Mesh(coneGeo,coneMat.clone());
      cone.position.set(cx,cy,CELL*.58); S.add(cone);
      occluders[r+'_'+c+'_t1']={mesh:trunk,cx,cy,faded:false};
      occluders[r+'_'+c+'_t2']={mesh:cone,cx,cy,faded:false};
    }else if(t===ROAD){ pushQuad(roadPos,CELL*.97,cx,cy,.008); }
    else{ pushQuad(groundPos,CELL*.97,cx,cy,.005); }
  }
  // 建物を構造単位で描画 (1x1 / 2x2)
  for(const st of structures){
    const bt=BLDG_TYPES[st.typeIdx%BLDG_TYPES.length];
    const h=bt.height*CELL, span=st.fp, bw=span*CELL*0.8;
    const cx=st.c*CELL+span*CELL*0.5, cy=st.r*CELL+span*CELL*0.5;
    const gkey=span+'_'+h;
    if(!boxGeoByH[gkey]) boxGeoByH[gkey]=new THREE.BoxGeometry(bw,bw,h);
    const mats=getBuildingMaterial(st.typeIdx).map(m=>m.clone());
    const mesh=new THREE.Mesh(boxGeoByH[gkey],mats);
    mesh.position.set(cx,cy,h/2);
    S.add(mesh);
    occluders[st.r+'_'+st.c+'_b']={mesh,cx,cy,faded:false};
  }
  if(roadPos.length)   S.add(quadMesh(roadPos,0xc4c8cc));
  if(groundPos.length) S.add(quadMesh(groundPos,0x9ccc65));
  return S;
}

// ─── 近接フェード: キャラクターが建物/木のそばに来たら半透明にして視認性を保つ ──
const FADE_DIST=CELL*1.3, FADE_OPACITY=0.4;
function updateOcclusionFade(){
  const near=new Set();
  for(const a of agents){
    const ax=a.y*CELL+CELL*.5, ay=a.x*CELL+CELL*.5;
    for(const key in occluders){
      const o=occluders[key];
      const dx=o.cx-ax, dy=o.cy-ay;
      if(dx*dx+dy*dy<FADE_DIST*FADE_DIST) near.add(key);
    }
  }
  for(const key in occluders){
    const o=occluders[key], should=near.has(key);
    if(should===o.faded) continue;
    o.faded=should;
    const mats=Array.isArray(o.mesh.material)?o.mesh.material:[o.mesh.material];
    mats.forEach(m=>{ m.transparent=should; m.opacity=should?FADE_OPACITY:1; m.depthWrite=!should; m.needsUpdate=true; });
  }
}

// 洒落た人型: 箱の積み木をやめ、丸み・テーパー・陰影のある立ち姿にする。
// Z が上方向、+Y が正面 (進行方向)。親は renderLoop で z=CELL*.26 に置かれ、
// 足元のローカル z は -CELL*.26 (地面)。
function createAgentMesh(S,color){
  const g=new THREE.Group();
  const base=-CELL*.26;                                   // 地面 (足元)
  const skin=0xf1c9a5, hair=0x4a3b2f, pants=0x2b303a;
  const bodyMat =new THREE.MeshLambertMaterial({color});
  const skinMat =new THREE.MeshLambertMaterial({color:skin});
  const hairMat =new THREE.MeshLambertMaterial({color:hair});
  const pantsMat=new THREE.MeshLambertMaterial({color:pants});
  const upZ=geo=>{geo.rotateX(Math.PI/2);return geo;};    // Y軸ジオメトリを Z 上向きに

  // 脚 (細身・左右)
  const legGeo=upZ(new THREE.CylinderGeometry(CELL*.032,CELL*.028,CELL*.22,8));
  for(const sx of [-1,1]){
    const leg=new THREE.Mesh(legGeo,pantsMat);
    leg.position.set(sx*CELL*.05,0,base+CELL*.11);
    g.add(leg);
  }

  // 胴体: 裾に向かってわずかに広がるテーパー (コート/ワンピース風シルエット)
  const torso=new THREE.Mesh(
    upZ(new THREE.CylinderGeometry(CELL*.095,CELL*.135,CELL*.30,16)),bodyMat);
  torso.position.set(0,0,base+CELL*.35);
  g.add(torso);

  // 丸い肩
  const shoulders=new THREE.Mesh(new THREE.SphereGeometry(CELL*.12,16,10),bodyMat);
  shoulders.scale.set(1.05,.8,.7);
  shoulders.position.set(0,0,base+CELL*.49);
  g.add(shoulders);

  // 首
  const neck=new THREE.Mesh(upZ(new THREE.CylinderGeometry(CELL*.04,CELL*.045,CELL*.06,8)),skinMat);
  neck.position.set(0,0,base+CELL*.55);
  g.add(neck);

  // 頭
  const head=new THREE.Mesh(new THREE.SphereGeometry(CELL*.115,18,14),skinMat);
  head.scale.set(1,.95,1.05);
  head.position.set(0,0,base+CELL*.66);
  g.add(head);

  // 髪 (頭頂のドーム)
  const hairGeo=upZ(new THREE.SphereGeometry(CELL*.122,18,12,0,Math.PI*2,0,Math.PI*.62));
  const hairMesh=new THREE.Mesh(hairGeo,hairMat);
  hairMesh.position.set(0,-CELL*.012,base+CELL*.665);
  g.add(hairMesh);

  // 正面マーカー (鼻) — 進行方向の判別用に控えめに残す。Cone は既定で +Y を向く。
  const nose=new THREE.Mesh(new THREE.ConeGeometry(CELL*.03,CELL*.06,8),skinMat);
  nose.position.set(0,CELL*.11,base+CELL*.655);
  g.add(nose);

  S.add(g); return g;
}

// ════════════════════════════════════════════════════════════════════════════
//  シミュレーション状態
// ════════════════════════════════════════════════════════════════════════════
let MAP=makeMap(GRID,42), BUILDINGS=[];
function rebuildBuildings(map){BUILDINGS.length=0;for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++)if(map[r][c]===BUILDING)BUILDINGS.push([r,c]);}
function randB(ex){for(let i=0;i<500;i++){const b=BUILDINGS[Math.floor(Math.random()*BUILDINGS.length)];if(!ex||Math.abs(b[0]-ex[0])>1||Math.abs(b[1]-ex[1])>1)return[...b];}return[...BUILDINGS[0]];}

let agents=[], agentMeshes=[], trailMats={}, scene=null, paused=false, speedMul=1;
const TRAIL_GEO=new THREE.PlaneGeometry(CELL*.2,CELL*.2);

function initAgents(S){
  agentMeshes.forEach(m=>S.remove(m));
  agents.forEach(a=>a.trail.forEach(m=>S.remove(m)));
  agents=[]; agentMeshes=[];
  PERSONA_DEFS.forEach(def=>{
    if(!trailMats[def.id]) trailMats[def.id]=new THREE.MeshBasicMaterial({color:def.color,transparent:true,opacity:0.28,depthWrite:false});
    const b=randB(null), g=randB(b);
    agents.push({x:b[0]+0.5,y:b[1]+0.5,th:Math.random()*Math.PI*2,gx:g[0]+0.5,gy:g[1]+0.5,trips:0,viols:0,steps:0,stall:0,def,trail:[],explored:0,visited:new Set(),visMem:new Map()});
    agentMeshes.push(createAgentMesh(S,def.color));
  });
  applyGoals();          // 既存の goal 設定を再作成したエージェントへ反映
}

// ─── goal(z) 制御 ─────────────────────────────────────────────────────────────
//   personaGoals[id] = 建物タイプ index (未設定/-1 = なし=従来挙動)。
//   agent.goalZ に one-hot(Float32Array) を入れると inferAction が [cls,z] を頭へ渡す。
const personaGoals={};
function goalVec(typeIdx){
  if(typeIdx==null||typeIdx<0) return null;
  const z=new Float32Array(BLDG_TYPES.length); z[typeIdx]=1; return z;
}
function applyGoals(){
  agents.forEach(a=>{
    a.goalZ=goalVec(personaGoals[a.def.id]);
    // 学習時は z=目的地建物のタイプ なので、目的地も同タイプの建物へ張り替える
    if(a.goalZ){
      const ti=Array.from(a.goalZ).indexOf(1);
      const cands=BUILDINGS.filter(b=>(BUILDING_TYPES[b[0]+'_'+b[1]]||0)===ti);
      if(cands.length){ const g=cands[Math.floor(Math.random()*cands.length)]; a.gx=g[0]+0.5; a.gy=g[1]+0.5; }
    }
  });
}
// LLM / コンソールから直接叩ける口: setGoal('A', 7) で病院へ、 setGoal('A', -1) で解除
window.setGoal=(personaId,typeIdx)=>{ personaGoals[String(personaId).toUpperCase()]=typeIdx; applyGoals(); return {persona:personaId,type:typeIdx}; };
function addTrail(S,agent){
  const m=new THREE.Mesh(TRAIL_GEO,trailMats[agent.def.id]);
  m.position.set(agent.y*CELL+CELL*.5,agent.x*CELL+CELL*.5,.04);
  S.add(m); agent.trail.push(m);
  while(agent.trail.length>MAX_TRAIL){ const old=agent.trail.shift(); S.remove(old); }
}
// 実行中に軌跡の長さを変更 (短くした分は即座に削除)。コンソール/LLMから setTrailLength(300) 等
window.setTrailLength=(n)=>{
  MAX_TRAIL=Math.max(1,parseInt(n)||50);
  if(scene) agents.forEach(a=>{ while(a.trail.length>MAX_TRAIL){ const old=a.trail.shift(); scene.remove(old); } });
  return MAX_TRAIL;
};

async function stepAll(){
  if(paused||!scene) return;
  stepCount++;
  await prefetchAllActions(MAP, agents);
  for(const a of agents){
    const px=a.x,py=a.y, action=selectAction(a);
    const meta=personaMeta[a.def.id];
    // 旋回量は学習時 meta の rot_per_tick_deg と一致させる (旧モデルは 20°/tick のまま)
    const rot=(meta&&meta.rotPerTick)||ROT;
    if(action===1)a.th-=rot; else if(action===2)a.th+=rot;
    a.th=(a.th+Math.PI*2)%(Math.PI*2);
    if(action===0){
      const nx=Math.max(0.01,Math.min(GRID-0.01,a.x+Math.cos(a.th)*MOVE));
      const ny=Math.max(0.01,Math.min(GRID-0.01,a.y+Math.sin(a.th)*MOVE));
      const r=Math.max(0,Math.min(GRID-1,Math.floor(nx)));
      const c=Math.max(0,Math.min(GRID-1,Math.floor(ny)));
      if(PASSABLE.has(MAP[r][c])){
        a.x=nx;a.y=ny;
        const key=r+','+c; if(!a.visited.has(key)){a.visited.add(key);a.explored++;}
        addTrail(scene,a);
      }else a.viols++;
    }
    // 訪問メモリ (aux の visited セクタ率が参照。学習側と同じく毎tick現在セルを記録)
    if(a.visMem) a.visMem.set(Math.floor(a.x)+','+Math.floor(a.y), stepCount);
    a.steps++;
    const moved=(Math.abs(a.x-px)+Math.abs(a.y-py))>0.05;
    a.stall=moved?0:Math.min(a.stall+1,10);
    const dist=Math.sqrt((a.x-a.gx)**2+(a.y-a.gy)**2);
    if(dist<0.8){
      a.trips++;
      // goal(z) 設定中は同タイプの建物を次の目的地に選ぶ (学習時は z=目的地建物のタイプ)
      let g=null;
      if(a.goalZ){
        const ti=Array.from(a.goalZ).indexOf(1);
        const cands=BUILDINGS.filter(b=>(BUILDING_TYPES[b[0]+'_'+b[1]]||0)===ti
          &&(Math.abs(b[0]-Math.floor(a.x))>1||Math.abs(b[1]-Math.floor(a.y))>1));
        if(cands.length) g=cands[Math.floor(Math.random()*cands.length)];
      }
      if(!g) g=randB([Math.floor(a.x),Math.floor(a.y)]);
      a.gx=g[0]+0.5;a.gy=g[1]+0.5;
    }
  }
}

// ════════════════════════════════════════════════════════════════════════════
//  配信設定 (アスペクト比 / 画質 / FPS) — YouTube配信用
//  ─ ここの数値を書き換えれば起動時のデフォルトを変えられます。
//  ─ 画面右下の「⚙ 配信」ボタンからも切替でき、選択はブラウザに保存されます。
// ════════════════════════════════════════════════════════════════════════════
const STREAM_ASPECTS = {
  square: { w:1,  h:1, label:'正方形 (1:1)'    },   // ← 従来の正方形
  wide:   { w:16, h:9, label:'横長 (16:9)'     },   // ← YouTube配信向け
};
const STREAM_PRESETS = {
  //          scale = 内部描画解像度の倍率(1=最高) /  fps = 目標フレームレート
  H: { scale:1.0,  fps:60, label:'H — 高画質 60fps'          },   // 回線良好時
  M: { scale:0.75, fps:30, label:'M — 中 30fps'              },   // 中間
  L: { scale:0.5,  fps:20, label:'L — 低負荷 20fps'          },   // 回線が不安定なとき
};
const streamCfg = {
  aspect : 'square',   // 'square' | 'wide'  ← デフォルトのアスペクト比
  quality: 'H',        // 'H' | 'M' | 'L'    ← デフォルトの画質/FPS
};
function loadStreamCfg(){
  try{
    const s=JSON.parse(localStorage.getItem('streamCfg')||'{}');
    if(STREAM_ASPECTS[s.aspect])  streamCfg.aspect =s.aspect;
    if(STREAM_PRESETS[s.quality]) streamCfg.quality=s.quality;
  }catch(e){}
}
function saveStreamCfg(){ try{ localStorage.setItem('streamCfg',JSON.stringify(streamCfg)); }catch(e){} }
loadStreamCfg();

// ════════════════════════════════════════════════════════════════════════════
//  レンダラ / カメラ / ループ
// ════════════════════════════════════════════════════════════════════════════
const canvas=document.getElementById('scene');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=0.9;
const mainCam=new THREE.PerspectiveCamera(60,1,0.1,1200);
mainCam.up.set(0,0,1);

function resize(){
  const asp=STREAM_ASPECTS[streamCfg.aspect]||STREAM_ASPECTS.square;
  const ar=asp.w/asp.h;
  // ウィンドウ内に指定アスペクト比の最大矩形をフィットさせる
  const availW=window.innerWidth-24, availH=window.innerHeight-24;
  let w=availW, h=w/ar;
  if(h>availH){ h=availH; w=h*ar; }
  const scale=(STREAM_PRESETS[streamCfg.quality]||STREAM_PRESETS.H).scale;
  renderer.setPixelRatio(Math.min(devicePixelRatio,2)*scale);
  renderer.setSize(w,h,true);
  mainCam.aspect=ar; mainCam.updateProjectionMatrix();
}
window.addEventListener('resize',resize); resize();

const CAM_OVERVIEW_INTERVAL=20000;
let camTargetIdx=0, camSwitchTimer=Date.now();
function updateTrackingCamera(cam){
  const now=Date.now();
  if(now-camSwitchTimer>CAM_OVERVIEW_INTERVAL){ camTargetIdx=(camTargetIdx+1)%(agents.length+1); camSwitchTimer=now; updateCamBadge(); }
  cam.up.set(0,1,0);
  if(camTargetIdx===0||agents.length===0){
    cam.position.set(W*.5,W*.5,W*0.75); cam.lookAt(W*.5,W*.5+1,0);
  }else{
    const a=agents[camTargetIdx-1]; if(!a)return;
    const tx=a.y*CELL+CELL*.5, ty=a.x*CELL+CELL*.5;
    cam.position.set(tx,ty-CELL*5,CELL*7); cam.lookAt(tx,ty+CELL*1.5,0);
  }
}
function updateCamBadge(){
  const badge=document.getElementById('cam-badge');
  if(camTargetIdx===0){ badge.textContent='📷 Overview'; showThought(null); }
  else{ const a=agents[camTargetIdx-1]; if(a){ badge.textContent='🎯 '+a.def.name; showThought(a.def.name); } }
}

let lastT=performance.now(), lastFrameT=0;
function renderLoop(){
  requestAnimationFrame(renderLoop);
  if(!scene) return;
  const now=performance.now();
  // 目標FPSに合わせて描画を間引く (回線/負荷対策)
  const cap=(STREAM_PRESETS[streamCfg.quality]||STREAM_PRESETS.H).fps;
  if(now-lastFrameT < 1000/cap - 0.5) return;
  lastFrameT=now;
  const dt=Math.min(0.05,(now-lastT)/1000); lastT=now;
  agents.forEach((a,i)=>{
    const tx=a.y*CELL+CELL*.5, ty=a.x*CELL+CELL*.5, m=agentMeshes[i]; if(!m)return;
    m.position.x+=(tx-m.position.x)*Math.min(1,dt*14);
    m.position.y+=(ty-m.position.y)*Math.min(1,dt*14);
    m.position.z=CELL*.26;
    const tar=-a.th+Math.PI*.5; let dr=tar-m.rotation.z;
    while(dr>Math.PI)dr-=Math.PI*2; while(dr<-Math.PI)dr+=Math.PI*2;
    m.rotation.z+=dr*Math.min(1,dt*14);
  });
  updateTrackingCamera(mainCam);
  updateOcclusionFade();
  renderer.render(scene,mainCam);
}

let simRunning=false;
async function simLoop(){
  if(simRunning) return; simRunning=true;
  try{ for(let s=0;s<speedMul;s++) await stepAll(); }
  catch(e){ console.error('[Sim]',e); }
  finally{ simRunning=false; }
}

// ─── 思考ウィンドウ ───────────────────────────────────────────────────────────
let thoughtTimer=null;
function showThought(name){
  const box=document.getElementById('thought-box'), nameEl=document.getElementById('thought-persona'), textEl=document.getElementById('thought-text');
  if(thoughtTimer) clearInterval(thoughtTimer);
  if(!name||!PERSONA_THOUGHTS[name]){ box.style.display='none'; return; }
  const persona=PERSONA_DEFS.find(p=>p.name===name);
  nameEl.textContent='💭 '+name; nameEl.style.color=persona?persona.hex:'var(--accent)';
  const full=PERSONA_THOUGHTS[name]; let idx=0;
  textEl.innerHTML='<span class="thought-cursor"></span>'; box.style.display='block';
  thoughtTimer=setInterval(()=>{
    if(idx>=full.length){ clearInterval(thoughtTimer); return; }
    textEl.innerHTML=full.slice(0,++idx)+'<span class="thought-cursor"></span>';
  },40);
}

// ─── コントロール (admin) ──────────────────────────────────────────────────────
document.getElementById('b-pause').addEventListener('click',function(){ paused=!paused; this.classList.toggle('on',!paused); this.textContent=paused?'Resume':'Pause'; });
document.getElementById('b-reset').addEventListener('click',()=>{ if(scene) initAgents(scene); });
document.getElementById('b-speed').addEventListener('click',function(){ const l=[1,2,4]; speedMul=l[(l.indexOf(speedMul)+1)%3]; this.textContent='×'+speedMul; });
document.getElementById('b-newmap').addEventListener('click',()=>{
  MAP=makeMap(GRID,Math.floor(Math.random()*100000)); rebuildBuildings(MAP);
  scene=buildScene(MAP); initAgents(scene); camTargetIdx=0; camSwitchTimer=Date.now(); updateCamBadge();
});

function buildGoalPanel(){
  const opts=['<option value="-1">— なし(従来) —</option>']
    .concat(BLDG_TYPES.map((b,i)=>`<option value="${i}">${i}: ${b.name}</option>`)).join('');
  document.getElementById('goal-rows').innerHTML=PERSONA_DEFS.map(p=>
    `<div class="goal-row"><span class="goal-name" style="color:${p.hex}">${p.name}</span>`+
    `<select data-id="${p.id}">${opts}</select></div>`).join('');
  document.querySelectorAll('#goal-rows select').forEach(sel=>{
    sel.value=String(personaGoals[sel.dataset.id]??-1);
    sel.addEventListener('change',()=>{ personaGoals[sel.dataset.id]=parseInt(sel.value,10); applyGoals(); });
  });
  const anyGoal=Object.values(personaMeta).some(m=>m&&m.goalDim>0);
  document.getElementById('goal-note').style.display=anyGoal?'none':'block';
}
document.getElementById('b-goal').addEventListener('click',function(){
  const pnl=document.getElementById('goal-panel');
  const show=pnl.style.display!=='block';
  pnl.style.display=show?'block':'none'; this.classList.toggle('on',show);
  if(show) buildGoalPanel();
});

// ─── 配信設定 (アスペクト比 / 画質 / FPS) ──────────────────────────────────────
(function initStreamPanel(){
  const aSel=document.getElementById('cfg-aspect'), qSel=document.getElementById('cfg-quality');
  aSel.value=streamCfg.aspect; qSel.value=streamCfg.quality;
  aSel.addEventListener('change',()=>{ streamCfg.aspect =aSel.value; saveStreamCfg(); resize(); });
  qSel.addEventListener('change',()=>{ streamCfg.quality=qSel.value; saveStreamCfg(); resize(); });
})();
document.getElementById('b-stream').addEventListener('click',function(){
  const pnl=document.getElementById('stream-panel');
  const show=pnl.style.display!=='block';
  pnl.style.display=show?'block':'none'; this.classList.toggle('on',show);
});

// ════════════════════════════════════════════════════════════════════════════
//  起動
// ════════════════════════════════════════════════════════════════════════════
(async ()=>{
  try{
    setStatus('LOADING',false);
    setOverlay('Loading textures…',0.05);
    await Promise.all([loadOverviewTextures(), loadRaycastTextures()]);
    await loadONNX(p=>0.1+p*0.85);
    setOverlay('Building scene…',0.97);
    rebuildBuildings(MAP);
    scene=buildScene(MAP);
    initAgents(scene);
    updateCamBadge();
    const ready=dinoSession?Object.values(ortSessions).some(Boolean):false;
    setStatus(ready?'RUNNING':'FALLBACK', ready);
    dbg('boot done. dino='+!!dinoSession+' webgpu='+(navigator.gpu?'yes':'no'));
    document.getElementById('overlay').style.display='none';
    renderLoop();
    setInterval(simLoop,TICK);
  }catch(e){
    console.error(e);
    setOverlay('Init failed: '+e.message,1);
    setStatus('ERROR',false);
  }
})();
